openapi: 3.1.0
info:
  title: Project API
  version: 0.1.0
  description: |
    Project-level API contract for endpoints that do not belong to any module.
    Per-module APIs live in modules/<module_id>/interact/openapi.yaml.
    The aggregated LLM-friendly index is at docs/context/api/api-index.json.
    Regenerate: node .ai/scripts/ctl-api-index.mjs generate --touch
  x-source-mapping:
    routes: src/routes/
    controllers: src/controllers/
    schemas: src/schemas/
    middleware: src/middleware/
servers: []
paths: {}
#  /api/example:
