#      summary: Example endpoint
#      tags: [example]
#      security:
#        - bearerAuth: []
#      responses:
#        '200':
#          description: Success
#          content:
#            application/json:
#              schema:
#                $ref: '#/components/schemas/ExampleResponse'
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
  schemas: {}
